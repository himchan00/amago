        fi
        conda run --no-capture-output --name amago \
          python examples/07_metaworld.py \
          --run_name mate_full_trans_obs_sc_scale_full \
          --timestamp $$OLD_TIMESTAMP \
          $$RESUME_ARGS \
          --benchmark ml45 \
          --buffer_dir ${BASE_DIR}/buffer \
          --parallel_actors 40 \
