description: >
  ML45 - mate ablations: full transition, obs shortcut, and obs shortcut scale.
  NOTE: This YAML is configured for RESUME. Each job hardcodes OLD_TIMESTAMP to a
  prior experiment name so --timestamp + CKPT_DIR pick up old checkpoints and
  preserve wandb run continuity (run_name+timestamp → md5 → same wandb id).
  When starting a brand-new run, replace OLD_TIMESTAMP with $$AMLT_EXPERIMENT_NAME.

env_defaults:
  NODES: 1
  GPUS: 1
  MEM: 40
  BASE_DIR: /mnt/v-hihwang/projects/amago

target:
  service: sing
  workspace_name: wsgcrrbt
  name: msrresrchbasicvc

storage:
  my_storage:
    storage_account_name: azsussc
    container_name: v-hihwang
    mount_dir: /mnt/v-hihwang

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/main || true
    - conda create -y -n amago python=3.10
    # Pre-requisites (cython<3 required before mujoco_py build)
    - conda run --name amago pip install 'cython<3' setuptools wheel versioneer
    # PyTorch (CUDA 12.6) — cluster driver supports CUDA 12.8, NOT 13.0 (PyPI default)
    - conda run --name amago pip install torch==2.11.0 --index-url https://download.pytorch.org/whl/cu126
    # Restore setuptools (cu126 index downgrades to 70.x, but pyproject.toml PEP 639 needs >=77)
    - conda run --name amago pip install 'setuptools>=77,<82'
    # MuJoCo 210 binary
    - mkdir -p ~/.mujoco && cd ~/.mujoco && wget -q https://mujoco.org/download/mujoco210-linux-x86_64.tar.gz && tar -xzf mujoco210-linux-x86_64.tar.gz && rm mujoco210-linux-x86_64.tar.gz
    # AMAGO core (--no-build-isolation required)
    - cd /scratch/amlt_code && conda run --name amago pip install -e . --no-build-isolation
    # mujoco-py + patchelf (patchelf needed for mujoco_py JIT post-build step)
    - conda run --name amago pip install mujoco-py patchelf --no-build-isolation
    # MetaWorld (pinned commit)
    - conda run --name amago pip install 'metaworld @ git+https://github.com/Farama-Foundation/Metaworld.git@04be337a12305e393c0caf0cbf5ec7755c7c8feb' --no-build-isolation
    # scipy (MetaWorld dependency)
    - conda run --name amago pip install scipy
    # GL headers + stub libs for mujoco_py CPU builder (headless cluster has no mesa-dev)
    - conda run --name amago python /scratch/amlt_code/setup_mujoco_gl.py
    - ls /home/aiscuser/.conda/envs/amago/include/GL/osmesa.h /home/aiscuser/.conda/envs/amago/lib/libOSMesa.so /home/aiscuser/.conda/envs/amago/lib/libGL.so

code:
  local_dir: $CONFIG_DIR/..

jobs:
  - name: mate
    sku: ${NODES}x${MEM}G${GPUS}-A100
    process_count_per_node: 1
    sla_tier: Standard
    execution_mode: basic
    submit_args:
      env:
        AMLT_DOCKERFILE_TEMPLATE: default
        SHARED_MEMORY_PERCENT: 0.5
        WANDB_API_KEY: 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
        PYTHONUNBUFFERED: "1"
    command:
      - "ulimit -n 65536"
      - "export MUJOCO_PY_MUJOCO_PATH=/home/aiscuser/.mujoco/mujoco210"
      - "export LD_LIBRARY_PATH=/home/aiscuser/.conda/envs/amago/lib:/home/aiscuser/.mujoco/mujoco210/bin:$$LD_LIBRARY_PATH"
      - "export C_INCLUDE_PATH=/home/aiscuser/.conda/envs/amago/include:$$C_INCLUDE_PATH"
      - "export LIBRARY_PATH=/home/aiscuser/.conda/envs/amago/lib:$$LIBRARY_PATH"
      - |
        OLD_TIMESTAMP=novel-mantis
        CKPT_DIR=${BASE_DIR}/buffer/mate_$$OLD_TIMESTAMP/ckpts/training_states
        LATEST_EPOCH=$$(ls "$$CKPT_DIR" 2>/dev/null | grep -o 'epoch_[0-9]*' | grep -o '[0-9]*' | sort -n | tail -1)
        RESUME_ARGS=""
        if [ -n "$$LATEST_EPOCH" ]; then
          echo "[INFO] Resuming from checkpoint at epoch $$LATEST_EPOCH"
          RESUME_ARGS="--ckpt $$LATEST_EPOCH"
        else
          echo "[INFO] No checkpoint found, starting fresh training."
        fi
        conda run --no-capture-output --name amago \
          python examples/07_metaworld.py \
          --run_name mate \
          --timestamp $$OLD_TIMESTAMP \
          $$RESUME_ARGS \
          --benchmark ml45 \
          --buffer_dir ${BASE_DIR}/buffer \
          --parallel_actors 40 \
          --memory_size 320 \
          --timesteps_per_epoch 1501 \
          --agent_type multitask \
          --max_seq_len 256 \
          --memory_layers 3 \
          --dset_max_size 25000 \
          --epochs 5000 \
          --val_interval 40 \
          --ckpt_interval 10 \
          --traj_encoder mate \
          --project_output

  - name: mate_full_trans_obs_sc_scale_tstep
    sku: ${NODES}x${MEM}G${GPUS}-A100
    process_count_per_node: 1
    sla_tier: Standard
    execution_mode: basic
    submit_args:
      env:
        AMLT_DOCKERFILE_TEMPLATE: default
        SHARED_MEMORY_PERCENT: 0.5
        WANDB_API_KEY: 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
        PYTHONUNBUFFERED: "1"
    command:
      - "ulimit -n 65536"
      - "export MUJOCO_PY_MUJOCO_PATH=/home/aiscuser/.mujoco/mujoco210"
      - "export LD_LIBRARY_PATH=/home/aiscuser/.conda/envs/amago/lib:/home/aiscuser/.mujoco/mujoco210/bin:$$LD_LIBRARY_PATH"
      - "export C_INCLUDE_PATH=/home/aiscuser/.conda/envs/amago/include:$$C_INCLUDE_PATH"
      - "export LIBRARY_PATH=/home/aiscuser/.conda/envs/amago/lib:$$LIBRARY_PATH"
      - |
        OLD_TIMESTAMP=normal-moose
        CKPT_DIR=${BASE_DIR}/buffer/mate_full_trans_obs_sc_scale_tstep_$$OLD_TIMESTAMP/ckpts/training_states
        LATEST_EPOCH=$$(ls "$$CKPT_DIR" 2>/dev/null | grep -o 'epoch_[0-9]*' | grep -o '[0-9]*' | sort -n | tail -1)
        RESUME_ARGS=""
        if [ -n "$$LATEST_EPOCH" ]; then
          echo "[INFO] Resuming from checkpoint at epoch $$LATEST_EPOCH"
          RESUME_ARGS="--ckpt $$LATEST_EPOCH"
        else
          echo "[INFO] No checkpoint found, starting fresh training."
        fi
        conda run --no-capture-output --name amago \
          python examples/07_metaworld.py \
          --run_name mate_full_trans_obs_sc_scale_tstep \
          --timestamp $$OLD_TIMESTAMP \
          $$RESUME_ARGS \
          --benchmark ml45 \
          --buffer_dir ${BASE_DIR}/buffer \
          --parallel_actors 40 \
          --memory_size 320 \
          --timesteps_per_epoch 1501 \
          --agent_type multitask \
          --max_seq_len 256 \
          --memory_layers 3 \
          --dset_max_size 25000 \
          --epochs 5000 \
          --val_interval 40 \
          --ckpt_interval 10 \
          --full_transition \
          --obs_shortcut \
          --obs_shortcut_scale tstep \
          --traj_encoder mate \
          --project_output

  - name: mate_full_trans_obs_sc_scale_full
    sku: ${NODES}x${MEM}G${GPUS}-A100
    process_count_per_node: 1
    sla_tier: Standard
    execution_mode: basic
    submit_args:
      env:
        AMLT_DOCKERFILE_TEMPLATE: default
        SHARED_MEMORY_PERCENT: 0.5
        WANDB_API_KEY: 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
        PYTHONUNBUFFERED: "1"
    command:
      - "ulimit -n 65536"
      - "export MUJOCO_PY_MUJOCO_PATH=/home/aiscuser/.mujoco/mujoco210"
      - "export LD_LIBRARY_PATH=/home/aiscuser/.conda/envs/amago/lib:/home/aiscuser/.mujoco/mujoco210/bin:$$LD_LIBRARY_PATH"
      - "export C_INCLUDE_PATH=/home/aiscuser/.conda/envs/amago/include:$$C_INCLUDE_PATH"
      - "export LIBRARY_PATH=/home/aiscuser/.conda/envs/amago/lib:$$LIBRARY_PATH"
      - |
        OLD_TIMESTAMP=normal-moose
        CKPT_DIR=${BASE_DIR}/buffer/mate_full_trans_obs_sc_scale_full_$$OLD_TIMESTAMP/ckpts/training_states
        LATEST_EPOCH=$$(ls "$$CKPT_DIR" 2>/dev/null | grep -o 'epoch_[0-9]*' | grep -o '[0-9]*' | sort -n | tail -1)
        RESUME_ARGS=""
        if [ -n "$$LATEST_EPOCH" ]; then
          echo "[INFO] Resuming from checkpoint at epoch $$LATEST_EPOCH"
          RESUME_ARGS="--ckpt $$LATEST_EPOCH"
        else
